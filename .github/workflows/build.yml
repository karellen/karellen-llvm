name: Build Core Packages
on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 1380
    continue-on-error: false
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SEGMENT_DOWNLOAD_TIMEOUT_MINS: 60
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Twine
        shell: bash
        run: |
          set -eEux
          set -o pipefail

          echo "$HOME/.local/bin" >> $GITHUB_PATH
          PATH=$HOME/.local/bin:$PATH
          export PATH
          pip install --no-input --user --break-system-packages twine
          twine --version

      - name: Build
        shell: bash
        run: |
          set -eEux
          set -o pipefail

          for p in patches/*; do
            patch -d llvm-project -p1 < $p
          done

          ./docker-build.py -m build

      - name: Test
        shell: bash
        run: |
          set -eEux
          set -o pipefail

          twine check --strict wheels/*.whl
          ls -la wheels/*

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: wheels/*.whl

  release:
    needs: build
    if: github.ref_name == 'master'
    runs-on: self-hosted
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Download Wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels
          path: wheels

      - name: Release
        shell: bash
        run: |
          set -eEux
          set -o pipefail

          gh release create v$(./version_extractor.py -d llvm-project -m python) --generate-notes wheels/*.whl
          ./sync-submodule-tags.sh

  upload-pypi:
    needs: release
    if: github.ref_name == 'master'
    runs-on: self-hosted
    env:
      TWINE_USERNAME: __token__
      TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
    steps:
      - name: Install Twine
        shell: bash
        run: |
          set -eEux
          set -o pipefail

          echo "$HOME/.local/bin" >> $GITHUB_PATH
          PATH=$HOME/.local/bin:$PATH
          export PATH
          pip install --no-input --user --break-system-packages twine

      - name: Download Wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels
          path: wheels

      - name: Upload to PyPI
        shell: bash
        run: |
          set -eEux
          set -o pipefail

          for i in 1 2 3; do
              twine upload --non-interactive --skip-existing wheels/*.whl && break
              [ "$i" -lt 3 ] && sleep 5
          done
