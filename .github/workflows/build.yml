name: Build Core Packages
on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 1380
    continue-on-error: false
    outputs:
      version: ${{ steps.version.outputs.python_pkg_version }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SEGMENT_DOWNLOAD_TIMEOUT_MINS: 60
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Twine
        shell: bash
        run: |
          set -eEux
          set -o pipefail

          echo "$HOME/.local/bin" >> $GITHUB_PATH
          PATH=$HOME/.local/bin:$PATH
          export PATH
          pip install --no-input --user --break-system-packages twine
          twine --version

      - name: Build
        shell: bash
        run: |
          set -eEux
          set -o pipefail

          for p in patches/*; do
            patch -d llvm-project -p1 < $p
          done

          ./docker-build.py -m build

      - name: Test
        shell: bash
        run: |
          set -eEux
          set -o pipefail

          twine check --strict wheels/*.whl
          ls -la wheels/*

      - name: Extract Version
        id: version
        shell: bash
        run: |
          set -eEux
          set -o pipefail

          PYTHON_PKG_VERSION=$(./version_extractor.py -d llvm-project -m python)
          echo "python_pkg_version=$PYTHON_PKG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync Submodule Tags
        if: github.ref_name == 'master'
        shell: bash
        run: |
          set -eEux
          set -o pipefail

          ./sync-submodule-tags.sh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: wheels/*.whl

  release:
    needs: build
    if: github.ref_name == 'master'
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Download Wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels
          path: wheels

      - name: Release
        shell: bash
        run: |
          set -eEux
          set -o pipefail

          gh release create "v${{ needs.build.outputs.python_pkg_version }}" --generate-notes wheels/*.whl

  upload-pypi:
    needs: [build, release]
    if: github.ref_name == 'master'
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TWINE_USERNAME: __token__
      TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
    steps:
      - name: Install Twine
        shell: bash
        run: |
          set -eEux
          set -o pipefail

          pip install --no-input twine

      - name: Download Wheels from Release
        shell: bash
        env:
          GH_REPO: ${{ github.repository }}
        run: |
          set -eEux
          set -o pipefail

          mkdir -p wheels
          gh release download "v${{ needs.build.outputs.python_pkg_version }}" --pattern '*.whl' --dir wheels

      - name: Upload to PyPI
        shell: bash
        run: |
          set -eEux
          set -o pipefail

          for i in 1 2 3; do
              twine upload --non-interactive --skip-existing wheels/*.whl && break
              [ "$i" -lt 3 ] && sleep 5
          done
